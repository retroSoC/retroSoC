name: test

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Download and Extract Verilator Artifact
      run: |
        verilator_path="artifact-verilator"
        mkdir $verilator_path
        wget https://github.com/retroSoC/artifact/releases/download/verilator-v5.046/verilator-v5.046-ubuntu-22.04-gcc.tar.gz
        tar -xvf verilator-v5.046-ubuntu-22.04-gcc.tar.gz -C $verilator_path
        echo "$(pwd)/$verilator_path/bin" >> $GITHUB_PATH
        sudo apt-get update
        sudo apt-get install git help2man perl python3 make autoconf g++ flex bison ccache mold
        sudo apt-get install libunwind-dev libgoogle-perftools-dev numactl perl-doc
        sudo apt-get install libfl2
        sudo apt-get install libfl-dev
        sudo apt-get install zlib1g zlib1g-dev
        sudo apt-get install tree

    - name: Test Verilator Toolchain
      run: |
        verilator --version

    - name: Download and Extract Sv2v Artifact
      run: |
        sv2v_path="artifact-sv2v"
        mkdir $sv2v_path
        wget https://github.com/retroSoC/artifact/releases/download/sv2v-v0.0.13-9-gd381209/sv2v-v0.0.13-9-gd381209-ubuntu-22.04-gcc.tar.gz
        tar -xvf sv2v-v0.0.13-9-gd381209-ubuntu-22.04-gcc.tar.gz -C $sv2v_path
        echo "$(pwd)/$sv2v_path" >> $GITHUB_PATH

    - name: Test Sv2v Toolchain
      run: |
        sv2v --version

    - name: Download and Extract Iverilog Artifact
      run: |
        iverilog_path="artifact-iverilog"
        mkdir $iverilog_path
        wget https://github.com/retroSoC/artifact/releases/download/iverilog-v13_0/iverilog-v13_0-ubuntu-22.04-gcc.tar.gz
        tar -xvf iverilog-v13_0-ubuntu-22.04-gcc.tar.gz -C $iverilog_path
        echo "$(pwd)/$iverilog_path/bin" >> $GITHUB_PATH

    - name: Test Iverilog Toolchain
      run: |
        iverilog -V

    - name: Download and Extract Yosys Artifact
      run: |
        yosys_path="artifact-yosys"
        mkdir $yosys_path
        wget https://github.com/retroSoC/artifact/releases/download/yosys-v0.58/yosys-v0.58-ubuntu-22.04-gcc.tar.gz
        tar -xvf yosys-v0.58-ubuntu-22.04-gcc.tar.gz -C $yosys_path
        echo "$(pwd)/$yosys_path/bin" >> $GITHUB_PATH

    - name: Test Yosys Toolchain
      run: |
        yosys --version

    - name: Download and Extract OpenSTA Artifact
      run: |
        opensta_path="artifact-opensta"
        mkdir $opensta_path
        wget https://github.com/retroSoC/artifact/releases/download/opensta-v2.2.0-1767-ga93b51ec/opensta-v2.2.0-1767-ga93b51ec-ubuntu-22.04-gcc.tar.gz
        tar -xvf opensta-v2.2.0-1767-ga93b51ec-ubuntu-22.04-gcc.tar.gz -C $opensta_path
        echo "$(pwd)/$opensta_path/bin" >> $GITHUB_PATH

    - name: Test OpenSTA Toolchain
      run: |
        sta -version

    - name: Download and Extract RISC-V GNU Toolchain Artifact
      run: |
        riscv_toolchain_path="artifact-riscv-toolchain"
        mkdir $riscv_toolchain_path
        wget https://github.com/riscv-collab/riscv-gnu-toolchain/releases/download/2025.05.01/riscv32-elf-ubuntu-22.04-gcc-nightly-2025.05.01-nightly.tar.xz
        tar -xvf riscv32-elf-ubuntu-22.04-gcc-nightly-2025.05.01-nightly.tar.xz -C $riscv_toolchain_path
        echo "$(pwd)/$riscv_toolchain_path/riscv/bin" >> $GITHUB_PATH

    - name: Test RISCV-V GNU Toolchain
      run: |
        riscv32-unknown-elf-gcc --version

    - name: Setup MPW Repository
      run: |
        pip install tomli
        python3 setup.py

    - name: Generate modified core
      run: python3 rtl/mini/core/setup.py

    - name: Download clusterIP
      run: python3 rtl/clusterip/setup.py

    - name: Download 3rd-party IP and models
      run: python3 rtl/ip/setup.py

    - name: Download Open PDK Repository
      run: python3 pdk/setup.py

    - name: Config FatFs and Coremark Repository
      run: python3 app/setup.py

    - name: Compile Single Core Firmware
      run: make CORE=HAZARD3 IP=NONE ISA=RV32IM HAVE_CSR=NO PROG_TYPE=BASE LINK_TYPE=ld2_psram firmware

    - name: Run Verilator Behavioral Simulation(Single Core)
      run: make CORE=HAZARD3 IP=NONE SIMU=VERILATOR PDK=IHP130 HAVE_SRAM_IF=NO HAVE_SRAM_MACRO=NO HAVE_PLL=NO sim

    - name: Compile MDD Firmware
      run: make CORE=MDD IP=NONE ISA=RV32IM HAVE_CSR=NO PROG_TYPE=BASE LINK_TYPE=ld2_psram firmware

    - name: Run Verilator Behavioral Simulation(MDD)
      run: make CORE=MDD IP=NONE SIMU=VERILATOR PDK=IHP130 HAVE_SRAM_IF=NO HAVE_SRAM_MACRO=NO HAVE_PLL=NO RTL_SIM_CORESEL=0 sim

    - name: Compile Assembly Firmware
      run: make ISA=RV32IM HAVE_CSR=NO PROG_TYPE=BASE LINK_TYPE=ld2_psram asm

    - name: Run Iverilog Behavioral Simulation(Single Core)
      run: make CORE=HAZARD3 IP=NONE SIMU=IVERILOG PDK=IHP130 HAVE_SRAM_IF=NO HAVE_SRAM_MACRO=NO HAVE_PLL=NO RTL_SIM_TIMEOUT=5200000 sim

    - name: Run synthesis
      run: make CORE=HAZARD3 IP=NONE SYNTH=YOSYS PDK=IHP130 HAVE_SRAM_IF=NO HAVE_SRAM_MACRO=NO HAVE_PLL=NO synth

    - name: Run Iverilog Netlist Simulation(Single Core)
      run: make CORE=HAZARD3 IP=NONE SIMU=IVERILOG PDK=IHP130 HAVE_SRAM_IF=NO HAVE_SRAM_MACRO=NO HAVE_PLL=NO RTL_SIM_TIMEOUT=5200000 netsim

    # - name: Upload to Actions Artifacts(Temporary storage)
    #   uses: actions/upload-artifact@v4
    #   with:
    #     name: ${{ env.PACKAGE_NAME }}
    #     path: |
    #       verilator/${{ env.PACKAGE_NAME }}.tar.gz
    #       verilator/${{ env.PACKAGE_NAME }}.tar.gz.sha256
    #     retention-days: 90 # Retain for 90 days

    - name: Success Notification
      run: echo "RTL simulation completed successfully"